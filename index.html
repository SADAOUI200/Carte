<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة وطباعة البطاقات المهنية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Amiri', 'Traditional Arabic', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #047857;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: #334155;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #047857;
        }

        .emp-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .emp-table th, .emp-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: center;
            font-size: 15px;
        }

        .emp-table th {
            background-color: #047857;
            color: white;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }

        .btn-add {
            background-color: #0284c7;
            color: white;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background-color: #0369a1;
        }

        .btn-submit {
            background-color: #047857;
            color: white;
            width: 100%;
            font-size: 18px;
        }

        .btn-submit:hover {
            background-color: #065f46;
        }

        .btn-delete {
            background-color: #e11d48;
            color: white;
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #be123c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>نظام إعداد وطباعة البطاقات المهنية</h1>

        <!-- معلومات المؤسسة والمدير -->
        <div class="form-section">
            <div class="form-group">
                <label>مكان العمل (المؤسسة):</label>
                <input type="text" id="workPlace" placeholder="مثال: ثانوية متقن توقرت" value="ثانوية متقن توقرت">
            </div>
            <div class="form-group">
                <label>اسم مدير التربية:</label>
                <input type="text" id="directorName" placeholder="مثال: أحمد علي" value="أحمد علي">
            </div>
            <div class="form-group">
                <label>اسم صورة ظهر البطاقة:</label>
                <input type="text" id="cardBackImage" value="aria.jpg">
            </div>
        </div>

        <h3>قائمة الموظفين</h3>
        <br>
        <button type="button" class="btn btn-add" onclick="addEmployeeRow()">+ إضافة موظف</button>

        <form id="cardsForm" onsubmit="handleFormSubmit(event)">
            <table class="emp-table">
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>اللقب</th>
                        <th>الاسم</th>
                        <th>تاريخ الميلاد</th>
                        <th>الرتبة</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="employeesTableBody">
                    <!-- سيتم إضافة الصفوف هنا تلقائياً -->
                </tbody>
            </table>

            <button type="submit" class="btn btn-submit">توليد وانتقال لصفحة الطباعة 🖨️</button>
        </form>
    </div>

    <script>
        // إضافة صف موظف جديد لجدول الإدخال
        function addEmployeeRow(data = {}) {
            const tbody = document.getElementById('employeesTableBody');
            const rowCount = tbody.rows.length + 1;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="emp-code" value="${data.code || '100' + rowCount}" required style="width: 70px;"></td>
                <td><input type="text" class="emp-lastName" value="${data.lastName || ''}" placeholder="اللقب" required></td>
                <td><input type="text" class="emp-firstName" value="${data.firstName || ''}" placeholder="الاسم" required></td>
                <td><input type="text" class="emp-birthDate" value="${data.birthDate || '1990/01/01'}" placeholder="YYYY/MM/DD" required style="width: 110px;"></td>
                <td><input type="text" class="emp-rank" value="${data.rank || 'أستاذ التعليم الثانوي'}" placeholder="الرتبة" required></td>
                <td><button type="button" class="btn btn-delete" onclick="this.closest('tr').remove()">حذف</button></td>
            `;
            tbody.appendChild(tr);
        }

        // إدخال بيانات نمطية افتراضية للتجربة السريعة
        function loadDefaultEmployees() {
            const sampleData = [
                { code: "1001", lastName: "سعداوي", firstName: "زين العابدين", birthDate: "1992/05/14", rank: "مهندس دولة" },
                { code: "1002", lastName: "بن محمد", firstName: "عبد الله", birthDate: "1988/11/20", rank: "أستاذ التعليم الثانوي" }
            ];
            sampleData.forEach(emp => addEmployeeRow(emp));
        }

        // معالجة الضغط على زر التوليد والانتقال
        function handleFormSubmit(event) {
            event.preventDefault(); // منع الإرسال التقليدي (لتفادي خطأ 405)

            const rows = document.querySelectorAll('#employeesTableBody tr');
            const employeesList = [];

            rows.forEach(row => {
                employeesList.push({
                    code: row.querySelector('.emp-code').value,
                    lastName: row.querySelector('.emp-lastName').value,
                    firstName: row.querySelector('.emp-firstName').value,
                    birthDate: row.querySelector('.emp-birthDate').value,
                    rank: row.querySelector('.emp-rank').value,
                    photo: "" // يمكن إضافة مسار الصورة هنا إذا توفرت
                });
            });

            // تجميع البيانات في الكائن الموحد
            const printData = {
                workPlace: document.getElementById('workPlace').value,
                directorName: document.getElementById('directorName').value,
                cardBackImage: document.getElementById('cardBackImage').value,
                employees: employeesList
            };

            // حفظ البيانات في LocalStorage التابع للمتصفح
            localStorage.setItem('print_data', JSON.stringify(printData));

            // التوجيه المباشر إلى صفحة الطباعة
            window.location.href = 'print.html';
        }

        // تحميل موظفين تلقائياً عند فتح الصفحة لأول مرة
        document.addEventListener('DOMContentLoaded', () => {
            loadDefaultEmployees();
        });
    </script>
</body>
</html>
